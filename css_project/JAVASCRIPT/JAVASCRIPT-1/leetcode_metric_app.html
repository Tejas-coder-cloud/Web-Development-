<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leetcode metric app </title>
    <link rel="stylesheet" href="leetcode_metric_app.css">
</head>
<body>
    <div class="container">
        <!-- heading 
        user
        stats -->
        <h1>Leetcode_metric</h1>
        <div class="user-container">
            <p>Enter your username below: </p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter your username here " id="user-input">
                <button id="searchbutton">Search</button>
            </div>

        </div>
        <div class="statscontainer">
            <div class="progress">
                <div class="progress-item ">
                    <div class="easy-progress circle">
                        <span id="easy-label"></span>
                            <p>Easy</p>
                    </div>
                </div>
                <div class="progress-item ">
                    <div class="medium-progress circle">
                        <span id="medium-label"></span>
                            <p>Medium</p>
                    </div>

                </div>
                <div class="progress-item ">
                    <div class="hard-progress circle">
                        <span id="hard-label"></span>
                            <p>Hard</p>
                    </div>

                </div>
            </div>
            <div class="statscard">
                <!-- directly populate card from JS code -->
            </div>

        </div>
    </div>
    <script src="leetcode_metrics_app.js"></script>
</body>
</html>
